<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Guesser</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4f46e5,#06b6d4);
    color:white;
}

.container{
    text-align:center;
    max-width:700px;
    padding:40px;
}

h1{
    font-size:4rem;
    margin-bottom:15px;
}

h1 span{
    color:#facc15;
}

p{
    font-size:1.2rem;
    line-height:1.7;
    margin-bottom:30px;
    opacity:0.9;
}

.btn{
    display:inline-block;
    text-decoration:none;
    color:#111827;
    background:#facc15;
    padding:15px 35px;
    border-radius:50px;
    font-size:1.1rem;
    font-weight:600;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 20px rgba(0,0,0,.2);
}

.card{
    margin-top:50px;
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.box{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    padding:20px;
    border-radius:15px;
    width:180px;
}

.box h3{
    font-size:1.5rem;
    margin-bottom:10px;
}

.box p{
    font-size:.95rem;
    margin:0;
}

@media(max-width:768px){
    h1{
        font-size:2.8rem;
    }

    p{
        font-size:1rem;
    }
}
</style>
</head>
<body>

<div class="container">

    <h1><span>🎯</span> Number Guesser</h1>

    <p>
        Test your luck and logic! Guess the secret number,
        get hints, and see how quickly you can win.
        Challenge yourself and beat your best score.
    </p>

    <a href="#" class="btn">Play Now</a>

    <div class="card">

        <div class="box">
            <h3>100</h3>
            <p>Possible Numbers</p>
        </div>

        <div class="box">
            <h3>10</h3>
            <p>Attempts to Win</p>
        </div>

        <div class="box">
            <h3>🏆</h3>
            <p>Beat Your Record</p>
        </div>

    </div>

</div>

</body>
</html>
