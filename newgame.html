<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dino Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #f7f7f7;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }
    #game {
      position: relative;
      width: 800px;
      height: 200px;
      background: #fff;
      overflow: hidden;
      border: 2px solid #333;
    }
    #dino {
      position: absolute;
      bottom: 0;
      left: 50px;
      width: 40px;
      height: 40px;
      background: #333;
      border-radius: 5px;
    }
    .obstacle {
      position: absolute;
      bottom: 0;
      width: 20px;
      height: 40px;
      background: #555;
      animation: moveObstacle 2s linear infinite;
    }
    @keyframes moveObstacle {
      from { right: -20px; }
      to { right: 820px; }
    }
    #score {
      position: absolute;
      top: 10px;
      right: 20px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="game">
    <div id="dino"></div>
    <div id="score">0</div>
  </div>

  <script>
    const dino = document.getElementById('dino');
    const game = document.getElementById('game');
    const scoreDisplay = document.getElementById('score');
    let jumping = false;
    let score = 0;
    let gameOver = false;

    document.addEventListener('keydown', e => {
      if (e.code === 'Space' && !jumping && !gameOver) jump();
      if (e.code === 'Enter' && gameOver) restart();
    });

    function jump() {
      jumping = true;
      let jumpHeight = 0;
      const upInterval = setInterval(() => {
        if (jumpHeight >= 100) {
          clearInterval(upInterval);
          const downInterval = setInterval(() => {
            if (jumpHeight <= 0) {
              clearInterval(downInterval);
              jumping = false;
            }
            jumpHeight -= 5;
            dino.style.bottom = jumpHeight + 'px';
          }, 20);
        }
        jumpHeight += 5;
        dino.style.bottom = jumpHeight + 'px';
      }, 20);
    }

    function createObstacle() {
      if (gameOver) return;
      const obstacle = document.createElement('div');
      obstacle.classList.add('obstacle');
      game.appendChild(obstacle);
      obstacle.style.right = '-20px';
      let obstacleInterval = setInterval(() => {
        let obstacleRight = parseInt(window.getComputedStyle(obstacle).right);
        obstacle.style.right = obstacleRight + 5 + 'px';

        // Collision detection
        let dinoBottom = parseInt(window.getComputedStyle(dino).bottom);
        if (obstacleRight > 730 && obstacleRight < 770 && dinoBottom < 40) {
          clearInterval(obstacleInterval);
          obstacle.remove();
          gameOver = true;
          scoreDisplay.innerHTML = 'Game Over! Press Enter';
        }

        if (obstacleRight > 820) {
          clearInterval(obstacleInterval);
          obstacle.remove();
          score++;
          scoreDisplay.textContent = score;
        }
      }, 20);

      // Spawn next obstacle
      setTimeout(createObstacle, Math.random() * 2000 + 1000);
    }

    function restart() {
      score = 0;
      gameOver = false;
      scoreDisplay.textContent = score;
      document.querySelectorAll('.obstacle').forEach(o => o.remove());
      createObstacle();
    }

    createObstacle();
  </script>
</body>
</html>
